name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: 27.0.12077973

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Build CLI JAR
        run: ./gradlew :cli:jar --stacktrace

      - name: Run Tests
        run: ./gradlew test --stacktrace

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ZenPatch v${{ env.VERSION }}
          body: |
            ## ZenPatch v${{ env.VERSION }}

            Non-root Xposed framework for Android 12-16.

            ### Downloads
            - `ZenPatch-v${{ env.VERSION }}-release.apk` - Manager App
            - `zenpatch-cli-v${{ env.VERSION }}.jar` - CLI Tool (requires JDK 17+)

            ### Changelog
            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Verification
            ```
            java -jar zenpatch-cli-v${{ env.VERSION }}.jar verify <apk>
            ```
          files: |
            app/build/outputs/apk/release/*.apk
            cli/build/libs/*.jar
          draft: false
          prerelease: ${{ contains(env.VERSION, 'alpha') || contains(env.VERSION, 'beta') || contains(env.VERSION, 'rc') }}
